<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="600" viewBox="0 0 1920 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background from deep blue to a slightly lighter blue -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Full background using the gradient -->
  <rect width="1920" height="600" fill="url(#bgGradient)"/>
  
  <!-- Abstract Diagonal Polygon Layers -->
  <polygon points="0,0 640,0 480,300 0,300" fill="#3B82F6" opacity="0.6"/>
  <polygon points="640,0 1920,0 1440,600 480,300" fill="#60A5FA" opacity="0.4"/>
  <polygon points="480,300 1440,600 0,600" fill="#93C5FD" opacity="0.3"/>
  
  <!-- Decorative Circles for extra texture -->
  <circle cx="1600" cy="150" r="100" fill="#BFDBFE" opacity="0.5"/>
  <circle cx="300" cy="450" r="80" fill="#BFDBFE" opacity="0.5"/>
</svg>
